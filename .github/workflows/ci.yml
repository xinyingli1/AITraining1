name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Force installing from public PyPI if staging index isn't accessible in GitHub Actions
        pip install -r requirements.txt -r requirements-dev.txt --index-url https://pypi.org/simple

    - name: Lint with Ruff
      run: |
        python -m ruff check .

    - name: Check Formatting with Ruff
      run: |
        python -m ruff format --check .

    - name: Run Tests with Pytest
      run: |
        python -m pytest

  build-docker:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    # Only build docker image on push to main (e.g. merge)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to true and add login steps if pushing to a registry (e.g. GHCR)
        tags: meal-planning-agent:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
